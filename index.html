<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FELIZ PRIMER AÑO MI PEQUE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400&display=swap');

        :root {
            --primary-pink: #ff4d94;
            --light-pink: #ffb6c1;
            --dark-pink: #d10047;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #ffe6eb 0%, #ffb6c1 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #heart-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 100;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            bottom: -100px;
            background-color: #ff3366;
            width: 20px;
            height: 20px;
            transform: rotate(-45deg);
            animation: floatUp 5s infinite ease-in;
            box-shadow: 0 0 10px #ff3366, 0 0 20px #ff66b2;
        }
        .heart::before, .heart::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #ff3366;
            border-radius: 50%;
        }
        .heart::before { top: -10px; left: 0; }
        .heart::after { top: 0; left: 10px; }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(-45deg) scale(0.5); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(-45deg) scale(1.5); opacity: 0; }
        }

        .book-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .book-container {
            perspective: 1500px;
            margin-bottom: 30px;
        }

        .book {
            width: 400px;
            max-width: 90vw; /* Adaptable a móviles */
            height: 550px;
            position: relative;
            transform-style: preserve-3d;
            box-shadow: 20px 20px 40px rgba(0,0,0,0.3);
            border-radius: 10px 20px 20px 10px;
        }

        .page {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1), z-index 0.5s;
            background: linear-gradient(to right, #fdfbfb, #ebedee);
            border: 2px solid #ff99cc;
            border-radius: 10px 20px 20px 10px;
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 8px solid transparent;
            border-image: url('https://www.transparenttextures.com/patterns/cubes.png') 30 round;
        }

        .back { transform: rotateY(180deg); }

        h1, h2, h3 {
            font-family: 'Dancing Script', cursive;
            color: var(--dark-pink);
            text-shadow: 2px 2px 4px rgba(255, 153, 204, 0.8);
            margin: 10px 0;
        }

        /* Utilidades de texto para la portada */
        .date-text { font-size: 2.5rem; margin: 10px 0; }
        .surprise-text { font-family: 'Poppins', sans-serif; font-size: 1rem; color: #d10047; }

        .album-img {
            width: 85%;
            height: 55%;
            object-fit: cover;
            border: 10px solid #fff;
            border-bottom: 35px solid #fff;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            border-radius: 2px;
            margin-bottom: 15px;
            transform: rotate(-3deg);
            transition: transform 0.3s;
        }
        .album-img:hover { transform: scale(1.05) rotate(0deg); }
        .back .album-img { transform: rotate(3deg); }

        button {
            background: var(--primary-pink);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 77, 148, 0.4);
            transition: 0.3s;
            font-family: 'Dancing Script', cursive;
            margin-top: 15px;
        }
        button:hover { background: var(--dark-pink); transform: scale(1.05); }

        .nav-btn { padding: 8px 15px; font-size: 1.1rem; }

        .scroll-indicator {
            color: var(--dark-pink);
            font-size: 1.5rem;
            animation: bounce 2s infinite;
            opacity: 0;
            transition: opacity 1s;
        }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-15px); } 60% { transform: translateY(-7px); } }

        .letter-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; z-index: 10; box-sizing: border-box; }
        .letter-header { font-size: 3rem; margin-bottom: 20px; text-align: center; }
        .letter-paper {
            width: 90%; max-width: 600px; background-color: #fffaf0;
            background-image: repeating-linear-gradient(transparent, transparent 29px, #ffb6c1 29px, #ffb6c1 30px);
            padding: 40px 30px; border-radius: 5px; box-shadow: 5px 15px 30px rgba(0,0,0,0.15); position: relative;
            box-sizing: border-box;
        }
        .letter-content {
            width: 100%; min-height: 300px; background: transparent; border: none; outline: none;
            font-family: 'Dancing Script', cursive; font-size: 1.8rem; line-height: 30px;
            color: var(--dark-pink); resize: none; overflow: hidden;
        }
        .letter-content::placeholder { color: rgba(209, 0, 71, 0.4); }

        .cinema-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; margin-top: 40px; box-sizing: border-box; overflow: hidden; }
        .cinema-title { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: var(--dark-pink); text-shadow: 2px 2px 5px rgba(255, 255, 255, 0.9); margin-bottom: 30px; text-align: center; padding: 0 10px;}
        .film-strip-container { perspective: 1200px; width: 90%; max-width: 600px; }
        .film-strip {
            background-color: #1a0510; padding: 30px 0; border-radius: 12px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), 0 0 30px rgba(209, 0, 71, 0.4);
            transform: rotateY(-15deg) rotateX(10deg); transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.6s; position: relative;
            background-image: radial-gradient(circle, var(--light-pink) 5px, transparent 6px), radial-gradient(circle, var(--light-pink) 5px, transparent 6px);
            background-size: 25px 20px; background-position: 0 5px, 0 calc(100% - 5px); background-repeat: repeat-x;
        }
        .film-strip:hover { transform: rotateY(0deg) rotateX(0deg); box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 45px rgba(255, 77, 148, 0.8); }
        .film-frame {
            background-color: #000; margin: 0 25px; border-radius: 8px; padding: 10px; min-height: 250px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative;
            border: 2px solid var(--primary-pink); box-shadow: inset 0 0 20px rgba(255, 77, 148, 0.4); overflow: hidden;
        }
        #video-preview-cinema { width: 100%; max-height: 400px; border-radius: 5px; display: block; box-shadow: 0 0 15px rgba(255,255,255,0.2); object-fit: cover; }

        .music-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; margin-top: 60px; margin-bottom: 100px; box-sizing: border-box; }
        .turntable-container { display: flex; flex-direction: column; align-items: center; perspective: 1000px; width: 90%; max-width: 450px; }

        .record-player {
            width: 320px; height: 320px; background: linear-gradient(135deg, #ff99cc, #ff4d94); border-radius: 20px;
            box-shadow: 15px 15px 30px rgba(0,0,0,0.3), inset 5px 5px 15px rgba(255,255,255,0.5), inset -5px -5px 15px rgba(0,0,0,0.1);
            position: relative; display: flex; justify-content: center; align-items: center; transform: rotateX(25deg) rotateZ(0deg);
            transform-style: preserve-3d; border: 4px solid #fff; margin-bottom: -30px; z-index: 2; transition: transform 0.5s ease;
        }
        .record-player:hover { transform: rotateX(15deg) scale(1.02); }

        .vinyl { width: 260px; height: 260px; background: #111; border-radius: 50%; box-shadow: 0 10px 20px rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; background-image: repeating-radial-gradient(#111, #111 4px, #2a2a2a 5px, #111 6px); animation: spin 3s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .vinyl-label { width: 80px; height: 80px; background: var(--light-pink); border-radius: 50%; border: 2px solid #fff; display: flex; justify-content: center; align-items: center; font-size: 2rem; box-shadow: inset 0 0 10px rgba(209,0,71,0.5); position: relative; }
        .vinyl-label::after { content: ''; width: 15px; height: 15px; background: #222; border-radius: 50%; position: absolute; border: 2px solid #555; }

        .tonearm { position: absolute; top: 25px; right: 25px; width: 15px; height: 160px; background: linear-gradient(to right, #e0e0e0, #ffffff, #999999); border-radius: 10px; transform-origin: top center; transform: rotate(25deg); box-shadow: 5px 10px 15px rgba(0,0,0,0.5); z-index: 3; }
        .tonearm::before { content: ''; position: absolute; top: -15px; left: -15px; width: 45px; height: 45px; background: #ccc; border-radius: 50%; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .tonearm::after { content: ''; position: absolute; bottom: -15px; left: -10px; width: 35px; height: 50px; background: #333; border-radius: 5px; box-shadow: 2px 5px 10px rgba(0,0,0,0.5); }

        .spotify-container { width: 100%; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 20px; border-radius: 20px; border: 2px solid rgba(255, 255, 255, 0.8); box-shadow: 0 20px 40px rgba(209, 0, 71, 0.2); z-index: 1; box-sizing: border-box; }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #ffe6eb; }
        ::-webkit-scrollbar-thumb { background: var(--light-pink); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-pink); }

        @media (max-width: 768px) {
            .book {
                height: 130vw; /* Altura calculada proporcional al ancho de pantalla */
                max-height: 520px;
            }
            .front h1 { font-size: 2rem; }
            .front h2, .back h3, .front h3 { font-size: 1.4rem; }
            .date-text { font-size: 1.8rem; }
            
            .album-img { width: 90%; height: 45%; border-width: 6px; border-bottom-width: 25px; }
            button, .nav-btn { font-size: 0.95rem; padding: 8px 15px; }
            
            .letter-header, .cinema-title { font-size: 2.2rem; }
            
            /* Sincronizando line-height con el fondo a rayas para que coincida en móvil */
            .letter-content { font-size: 1.3rem; line-height: 28px; }
            .letter-paper { 
                background-image: repeating-linear-gradient(transparent, transparent 27px, #ffb6c1 27px, #ffb6c1 28px);
                padding: 30px 20px;
            }

            .film-strip-container { width: 95%; }
            .film-strip { padding: 15px 0; }
            .film-frame { margin: 0 10px; padding: 5px; min-height: 150px; }

            /* Escalamos todo el contenedor del tocadiscos en bloque para que no se desarme */
            .turntable-container {
                transform: scale(0.85);
                transform-origin: top center;
                margin-bottom: -40px;
            }
        }

        @media (max-width: 480px) {
            .turntable-container {
                transform: scale(0.75);
                margin-bottom: -60px;
            }
            .book-section { margin-bottom: 20px; }
            .scroll-indicator { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div id="heart-container"></div>

    <div class="book-section">
        <div class="book-container">
            <div class="book" id="book">
                
                <div class="page" id="page3" style="z-index: 8;">
                    <div class="front">
                        <h3>Diciembre juntos</h3>
                        <img src="5.JPG" alt="Foto 4" class="album-img">
                        <p class="surprise-text">(Hay más sorpresas abajo)</p>
                    </div>
                    <div class="back"></div>
                </div>

                <div class="page" id="page2" style="z-index: 9;">
                    <div class="front">
                        <h3>nuestras rutas nocturas</h3>
                        <img src="4.JPG" alt="Foto 2" class="album-img">
                        <button class="nav-btn" onclick="nextPage(2)">Pasar página ❯</button>
                    </div>
                    <div class="back">
                        <h3>dos meses juntos, celebrados</h3>
                        <img src="3.JPG" alt="Foto 3" class="album-img">
                        <button class="nav-btn" onclick="prevPage(2)">❮ Volver</button>
                    </div>
                </div>

                <div class="page cover" id="page1" style="z-index: 10;">
                    <div class="front">
                        <h1>Feliz primer año mi peque</h1>
                        <p class="date-text">30/06❤️</p>
                        <h2>Recuerdos de nuestro año juntos</h2>
                        <button onclick="nextPage(1)">Abrir álbum</button>
                    </div>
                    <div class="back">
                        <h3>El primer momento</h3>
                        <img src="1.jpeg" alt="Foto 1" class="album-img">
                        <button class="nav-btn" onclick="prevPage(1)">❮ Cerrar álbum</button>
                    </div>
                </div>

            </div>
        </div>
        <div class="scroll-indicator" id="scroll-arrow">Mas cositas para usted</div>
    </div>

    <div class="letter-wrapper">
        <h2 class="letter-header">Mi carta para ti...</h2>
        <div class="letter-paper">
            <textarea class="letter-content" placeholder="Ver de nuevo este 30/06 me llena el corazón; es un día que anhelaba revivir porque marca el inicio de lo mejor que me ha pasado. ¡Feliz primer aniversario, mi preciosa mujer! gracias por  enseñarme lo que es la felicidad plena.. La vida me dio el regalo más inmenso al permitirme caminar de la mano de una compañera tan perfecta como usted. Quiero que sepa que mi mayor propósito en lo que nos resta de vida es ser su refugio: seguir cuidándola, admirando a la mujer increíble que es y amándola con todas mis fuerzas.

Gracias por hacer de mi mundo un lugar tan feliz."></textarea>
        </div>
    </div>

    <div class="cinema-wrapper">
        <h2 class="cinema-title">Uno de muchos dias inolvidables</h2>
        <div class="film-strip-container">
            <div class="film-strip">
                <div class="film-frame">
                    <video id="video-preview-cinema" controls 
                           poster="2.jpeg"
                           src="video.mp4">
                    </video>
                </div>
            </div>
        </div>
    </div>

    <div class="music-wrapper">
        <h2 class="cinema-title">Una de muchas canciones suyas</h2>
        
        <div class="turntable-container">
            <div class="record-player">
                <div class="vinyl">
                    <div class="vinyl-label">❤️</div>
                </div>
                <div class="tonearm"></div>
            </div>
            
            <div class="spotify-container">
                <iframe style="border-radius:12px" 
                        src="https://open.spotify.com/embed/track/7I5pU6JAksvrQcE059vs1R?utm_source=generator" 
                        width="100%" height="152" frameBorder="0" allowfullscreen="" 
                        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
                </iframe>
            </div>
        </div>
    </div>

    <script>
        const heartContainer = document.getElementById('heart-container');
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heartContainer.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);

        function nextPage(pageNum) {
            const page = document.getElementById(`page${pageNum}`);
            page.style.transform = 'rotateY(-180deg)';
            
            setTimeout(() => {
                page.style.zIndex = pageNum; 
            }, 300); 
            
            if(pageNum === 2) { 
                setTimeout(() => {
                    document.getElementById('scroll-arrow').style.opacity = '1';
                }, 1000);
            }
        }

        function prevPage(pageNum) {
            const page = document.getElementById(`page${pageNum}`);
            page.style.transform = 'rotateY(0deg)';
            
            setTimeout(() => {
                page.style.zIndex = 10 - pageNum + 1;
            }, 300);
        }

        const textarea = document.querySelector('.letter-content');
        if (textarea) {
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });
        }
    </script>
</body>
</html>
